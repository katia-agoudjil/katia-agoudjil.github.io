<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGOUDJIL KATIA - Writing</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .writing-container {
            max-width: 900px;
            margin: 120px auto 80px;
            padding: 0 32px;
        }
        .sec-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #aaa;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            margin-bottom: 1.75rem;
            display: block;
        }
        .coming-block {
            border: 1px solid #383838;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
        }
        .coming-title {
            font-size: 22px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            color: #f0f0f0;
            margin: 0 0 14px;
        }
        .coming-sub {
            font-size: 15px;
            color: #bbb;
            font-family: 'Roboto Mono', monospace;
            line-height: 1.8;
            margin: 0 0 32px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        .topics {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 36px;
        }
        .topic {
            font-size: 13px;
            font-weight: 700;
            font-family: 'Lato', sans-serif;
            padding: 5px 14px;
            border-radius: 20px;
            background: rgba(65, 105, 225, 0.1);
            color: #7aabff;
            border: 1px solid rgba(65, 105, 225, 0.25);
        }
        .medium-link {
            font-size: 14px;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid #444;
            padding-bottom: 2px;
            transition: color 0.2s, border-color 0.2s;
        }
        .medium-link:hover {
            color: #4169E1;
            border-color: #4169E1;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-left">
            <span>Algiers, ALGERIA &nbsp;</span>
            <img src="images/dz.png" alt="Algerian Flag" class="flag">
        </div>
        <div class="navbar-right">
            <a href="index.html">Home</a>
            <a href="education.html">Education</a>
            <a href="skills.html">Skills</a>
            <a href="project.html">Projects</a>
            <a href="learn.html">Writing</a>
        </div>
    </nav>

    <div class="writing-container">

        <span class="sec-label">Writing</span>

        <div class="coming-block">
            <p class="coming-title">Articles on the way.</p>
            <p class="coming-sub">I write about data engineering, Power BI, and the things I pick up along the way. Topics I'm covering soon:</p>
            <div class="topics">
                <span class="topic">DAX patterns</span>
                <span class="topic">Snowflake</span>
                <span class="topic">Informatica</span>
                <span class="topic">ETL design</span>
                <span class="topic">Power BI tips</span>
                <span class="topic">Data modeling</span>
            </div>
            <a class="medium-link" href="https://medium.com/@katiaagoudjil" target="_blank">Follow on Medium ↗</a>
        </div>

    </div>

    <script>
        const navLinks = document.querySelectorAll('.navbar-right a');
        navLinks.forEach(link => {
            if (link.href === window.location.href) {
                link.classList.add('active');
            }
        });
    </script>

</body>
</html>
