<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGOUDJIL KATIA - Skills</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ── Skills Page ── */
        .skills-container {
            max-width: 1100px;
            margin: 120px auto 60px;
            padding: 0 24px;
        }

        .skills-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #888;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            margin-bottom: 2rem;
            display: block;
        }

        .charts-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .ncharts-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 60px;
        }

        .chart-container,
        .nchart-container {
            background-color: #fff;
            border-radius: 10px;
            padding: 10px;
        }

        @media (max-width: 768px) {
            .charts-wrapper,
            .ncharts-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-left">
            <span>Algiers, ALGERIA &nbsp;</span>
            <img src="images/dz.png" alt="Algerian Flag" class="flag">
        </div>
        <div class="navbar-right">
            <a href="index.html">Home</a>
            <a href="education.html">Education</a>
            <a href="skills.html">Skills</a>
            <a href="project.html">Projects</a>
            <a href="learn.html">Writing</a>
        </div>
    </nav>

    <div class="skills-container">

        <span class="skills-label">Skills</span>

        <!-- Row 1: 3 charts -->
        <div class="charts-wrapper">

            <div class="chart-container">
                <div style="min-height:610px" id="datawrapper-vis-OlnEv">
                    <script type="text/javascript" defer src="https://datawrapper.dwcdn.net/OlnEv/embed.js" charset="utf-8" data-target="#datawrapper-vis-OlnEv"></script>
                    <noscript><img src="https://datawrapper.dwcdn.net/OlnEv/full.png" alt="A pie chart showing my years of experience with different database technologies" /></noscript>
                </div>
            </div>

            <div class="chart-container">
                <div style="min-height:538px" id="datawrapper-vis-v0yWX">
                    <script type="text/javascript" defer src="https://datawrapper.dwcdn.net/v0yWX/embed.js" charset="utf-8" data-target="#datawrapper-vis-v0yWX"></script>
                    <noscript><img src="https://datawrapper.dwcdn.net/v0yWX/full.png" alt="A bar chart showing proficiency levels in different BI tools" /></noscript>
                </div>
            </div>

            <div class="chart-container">
                <div style="min-height:527px" id="datawrapper-vis-8mWM3">
                    <script type="text/javascript" defer src="https://datawrapper.dwcdn.net/8mWM3/embed.js" charset="utf-8" data-target="#datawrapper-vis-8mWM3"></script>
                    <noscript><img src="https://datawrapper.dwcdn.net/8mWM3/full.png" alt="An Election Donut showing proficiency levels in coding technologies" /></noscript>
                </div>
            </div>

        </div>

        <!-- Row 2: 3 charts -->
        <div class="ncharts-wrapper">

            <div class="nchart-container">
                <div style="min-height:555px" id="datawrapper-vis-gv9hq">
                    <script type="text/javascript" defer src="https://datawrapper.dwcdn.net/gv9hq/embed.js" charset="utf-8" data-target="#datawrapper-vis-gv9hq"></script>
                    <noscript><img src="https://datawrapper.dwcdn.net/gv9hq/full.png" alt="Years of experience with various Open Source and Operation Tools" /></noscript>
                </div>
            </div>

            <div class="nchart-container">
                <canvas id="softSkillsRadarChart"></canvas>
            </div>

            <div class="nchart-container">
                <div style="min-height:349px" id="datawrapper-vis-nxrSq">
                    <script type="text/javascript" defer src="https://datawrapper.dwcdn.net/nxrSq/embed.js" charset="utf-8" data-target="#datawrapper-vis-nxrSq"></script>
                    <noscript><img src="https://datawrapper.dwcdn.net/nxrSq/full.png" alt="My levels of fluency in different languages." /></noscript>
                </div>
            </div>

        </div>

    </div>

    <script>
        const ctx = document.getElementById('softSkillsRadarChart').getContext('2d');
        const softSkillsRadarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Communication', 'Teamwork', 'Technical Writing', 'Problem-solving', 'Creativity', 'Flexibility', 'Mentoring', 'Public Speaking'],
                datasets: [{
                    label: 'Proficiency Level',
                    data: [9, 8, 7, 8, 7, 8, 8, 8],
                    backgroundColor: 'rgba(65, 105, 225, 0.2)',
                    borderColor: 'rgba(65, 105, 225, 1)',
                    borderWidth: 2,
                    pointBackgroundColor: 'rgba(65, 105, 225, 1)',
                    pointBorderColor: 'rgba(65, 105, 225, 1)',
                    pointRadius: 6,
                    pointHoverRadius: 8
                }]
            },
            options: {
                plugins: {
                    title: {
                        display: true,
                        text: 'Soft Skills',
                        align: 'start',
                        font: { size: 20, weight: 'bold' },
                        color: 'black'
                    },
                    subtitle: {
                        display: true,
                        text: 'Proficiency levels in various soft skills',
                        align: 'start',
                        font: { size: 14, weight: 'normal' },
                        color: '#555'
                    }
                },
                scales: {
                    r: {
                        angleLines: { display: false },
                        suggestedMin: 0,
                        suggestedMax: 10,
                        pointLabels: {
                            font: { size: 14, weight: 'bold' }
                        }
                    }
                }
            }
        });
    </script>

    <script>
        const navLinks = document.querySelectorAll('.navbar-right a');
        navLinks.forEach(link => {
            if (link.href === window.location.href) {
                link.classList.add('active');
            }
        });
    </script>

</body>
</html>
